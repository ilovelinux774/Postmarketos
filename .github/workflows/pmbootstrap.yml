name: Build postmarketOS Image for GT-S7580

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y python3 python3-git openssl git openssh-client

    - name: Clone and Install pmbootstrap from Source
      run: |
        git clone https://gitlab.postmarketos.org/postmarketOS/pmbootstrap.git
        cd pmbootstrap
        sudo ln -s "$(pwd)/pmbootstrap.py" /usr/local/bin/pmbootstrap
        chmod +x pmbootstrap.py

    - name: Pre-clone pmaports Infrastructure
      run: |
        mkdir -p /home/runner/.local/var/pmbootstrap/cache_git
        git clone --depth=1 https://gitlab.postmarketos.org/postmarketOS/pmaports.git /home/runner/.local/var/pmbootstrap/cache_git/pmaports

    - name: Create Custom GT-S7580 (samsung-kylepro) Device Tree Directly
      run: |
        # Git hatasından kurtulmak için cihaz ağacı klasörlerini el ile oluşturuyoruz
        CHROOT_DEVICE_DIR="/home/runner/.local/var/pmbootstrap/cache_git/pmaports/device/testing/samsung-kylepro"
        mkdir -p "$CHROOT_DEVICE_DIR"
        
        # Temel deviceinfo dosyasını oluşturuyoruz
        cat <<EOF > "$CHROOT_DEVICE_DIR/deviceinfo"
        # Samsung Galaxy Trend Plus (GT-S7580) deviceinfo
        deviceinfo_format_version=0
        deviceinfo_name="Samsung Galaxy Trend Plus"
        deviceinfo_manufacturer="Samsung"
        deviceinfo_codename="samsung-kylepro"
        deviceinfo_year=2013
        deviceinfo_arch="armv7"
        
        # Bootlink configuration (Broadcom / RPi 1 benzeri mimari için)
        deviceinfo_kernel_cmdline="console=ttyS0,115200n8"
        deviceinfo_generate_bootimg="true"
        deviceinfo_bootimg_qcdt="false"
        deviceinfo_flash_method="heimdall-flash"
        EOF

        # Temel APKBUILD dosyasını oluşturuyoruz
        cat <<EOF > "$CHROOT_DEVICE_DIR/APKBUILD"
        # Maintainer: Custom Build
        pkgname=device-samsung-kylepro
        pkgver=1
        pkgrel=0
        pkgdesc="Samsung Galaxy Trend Plus config"
        url="https://postmarketos.org"
        arch="armv7"
        license="GPL-3.0-or-later"
        depends="postmarketos-base"
        source=""
        build() {
            return 0
        }
        package() {
            mkdir -p "\$pkgdir"
        }
        EOF

    - name: Setup pmbootstrap Configuration File
      run: |
        mkdir -p ~/.config
        cat <<EOF > ~/.config/pmbootstrap.cfg
        [pmbootstrap]
        version = 3
        work = /home/runner/.local/var/pmbootstrap
        jobs = 4
        ccache_size = 5G
        is_default_channel = False
        mirrors_alpine = http://dl-cdn.alpinelinux.org/alpine/
        auto_init = True

        [providers]

        [config]
        channel = edge
        arch = armv7
        device = samsung-kylepro
        ui = xfce4
        user = pmos
        extra_packages = none
        timezone = GMT
        keymaps = none
        EOF

    - name: Update pmaports Index
      run: |
        pmbootstrap update

    - name: Build Flashable Image
      run: |
        pmbootstrap install --no-fprofile
        pmbootstrap export

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: pmOS-GT-S7580
        path: /home/runner/.local/var/pmbootstrap/chroot_native/tmp/postmarketOS-export/*
