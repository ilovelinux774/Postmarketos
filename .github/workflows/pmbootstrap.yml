name: Build postmarketOS for samsung-kylepro

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-pip openssl git qemu-user-static

    - name: Install pmbootstrap
      run: |
        pip3 install --user pmbootstrap
        # pmbootstrap'ı PATH'e ekle
        echo "$HOME/.local/bin" >> $GITHUB_PATH

    - name: Clone pmaports
      run: |
        # kylepro'nun kararlı olduğu v24.06 dalı çekiliyor. 
        # En güncel paketler için 'edge' olarak değiştirebilirsin.
        git clone --depth=1 -b v24.06 https://gitlab.postmarketos.org/postmarketOS/pmaports.git $GITHUB_WORKSPACE/pmaports

    - name: Create non-interactive pmbootstrap configuration
      run: |
        mkdir -p ~/.config
        cat <<EOF > ~/.config/pmbootstrap.cfg
        [pmbootstrap]
        aports = $GITHUB_WORKSPACE/pmaports
        version = 3
        is_default_channel = True
        device = samsung-kylepro
        extra_packages = none
        channel = stable
        build_options = arch=armv7
        mirrors_postmarketos = http://mirror.postmarketos.org/postmarketos/
        sudo_workaround = True
        work = /home/runner/work/pmbootstrap_work
        EOF

    - name: Zap chroots (Clean start)
      run: |
        pmbootstrap zap

    - name: Build Device Packages
      run: |
        # Cihaz tanımlamalarını ve kernel'ı derler
        pmbootstrap build device-samsung-kylepro
        pmbootstrap build linux-samsung-kylepro

    - name: Generate Rootfs / Installation Image
      run: |
        # UI olarak weston seçildi (Hafif ve test için ideal). 
        # CI içinde şifre prompt'u geçmek için --password parametresi eklenmiştir.
        pmbootstrap install --ui weston --password 1234
