- name: Fix pmbootstrap init (Claude's Handshake)
  run: |
    # 1. pmaports içinde cihaz klasörünü oluştur (init'in cihaz bulamamasını engelle)
    mkdir -p pmaports/device/samsung/kylepro
    
    # 2. APKBUILD dosyasını oluştur (pmbootstrap cihazı tanısın diye)
    cat > pmaports/device/samsung/kylepro/APKBUILD <<EOF
    # Maintainer: Your Name <email>
    pkgname=device-samsung-kylepro
    pkgver=1
    pkgrel=0
    pkgdesc="Dummy device for Samsung GT-S7580 (bypass init)"
    url="https://postmarketos.org"
    license="MIT"
    arch="armv7"
    depends="linux-samsung-kylepro"
    makedepends="devicepkg-dev"
    source=""
    build() { deviceinfo_generate; }
    package() { deviceinfo_package; }
    EOF

    # 3. deviceinfo dosyasını oluştur (8 MB boot limitini yaz, init buna bakacak)
    cat > pmaports/device/samsung/kylepro/deviceinfo <<EOF
    deviceinfo_format_version=0
    deviceinfo_name="Samsung Galaxy Trend Plus"
    deviceinfo_codename="samsung-kylepro"
    deviceinfo_arch="armv7"
    deviceinfo_chipset="Broadcom BCM28155"
    deviceinfo_boot_part_size=8192
    deviceinfo_bootimg_mkbootimg_args="--kernel_offset 0x00008000"
    deviceinfo_flash_offset_base=0x00000000
    deviceinfo_flash_offset_kernel=0x00008000
    deviceinfo_flash_offset_ramdisk=0x01000000
    deviceinfo_flash_offset_second=0x00F00000
    deviceinfo_flash_offset_tags=0x00000100
    deviceinfo_flash_pagesize=2048
    EOF

    # 4. Artık resmi init komutunu pipe'layarak çalıştır (Hata vermeden geçecek!)
    printf "\n\n\n\n\n\n" | pmbootstrap init
