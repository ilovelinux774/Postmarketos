name: postmarketOS kylepro build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git python3 python3-pip alpine-sdk qemu-user-static
          pip3 install pmbootstrap

      - name: Enable binfmt (QEMU support for cross build)
        run: |
          sudo update-binfmts --enable qemu-arm || true

      - name: Clone pmaports
        run: |
          git clone https://gitlab.com/postmarketOS/pmaports.git

      - name: Initialize pmbootstrap
        run: |
          pmbootstrap --details-to-stdout \
            -p pmaports \
            init --non-interactive \
            --device samsung-kylepro \
            --channel edge

      - name: Build kernel package
        run: |
          pmbootstrap -p pmaports build linux-samsung-kylepro

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kylepro-build
          path: /home/runner/.local/var/pmbootstrap/packages/
