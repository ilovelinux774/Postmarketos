name: Build postmarketOS Image

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y python3 python3-git openssl git openssh-client

    - name: Clone and Install pmbootstrap from Source
      run: |
        git clone https://gitlab.postmarketos.org/postmarketOS/pmbootstrap.git
        cd pmbootstrap
        sudo ln -s "$(pwd)/pmbootstrap.py" /usr/local/bin/pmbootstrap
        chmod +x pmbootstrap.py

    - name: Setup pmbootstrap Configuration File Directly
      run: |
        # init komutunun hata vermesini önlemek için config dosyasını manuel oluşturuyoruz
        mkdir -p ~/.config
        cat <<EOF > ~/.config/pmbootstrap.cfg
        [pmbootstrap]
        version = 3
        work = /tmp/pmbootstrap-work
        jobs = 4
        ccache_size = 5G
        is_default_channel = False
        mirrors_alpine = http://dl-cdn.alpinelinux.org/alpine/
        auto_init = True

        [providers]

        [config]
        channel = edge
        arch = armv7
        device = samsung-j4plus
        ui = xfce4
        user = pmos
        extra_packages = none
        timezone = GMT
        keymaps = none
        EOF

    - name: Zap and Pull pmaports
      run: |
        # Konfigürasyon hazır olduğu için doğrudan depoları güncelleyebiliriz
        pmbootstrap update

    - name: Build Flashable Image
      run: |
        pmbootstrap install --no-fprofile
        pmbootstrap export

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: pmOS-samsung-j4plus
        path: /tmp/pmbootstrap-work/chroot_native/tmp/postmarketOS-export/*
 
