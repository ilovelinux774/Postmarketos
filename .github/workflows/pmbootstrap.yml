name: postmarketOS Build - Samsung Galaxy Trend Plus (kylepro)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  PMOS_UI: console
  PMOS_PASSWORD: "147147"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Disk alanini genislet
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/hostedtoolcache
          df -h

      - name: pmbootstrap kur
        run: |
          git clone --depth=1 https://gitlab.postmarketos.org/postmarketOS/pmbootstrap.git ~/pmbootstrap-tool
          mkdir -p ~/.local/bin
          ln -sf ~/pmbootstrap-tool/pmbootstrap.py ~/.local/bin/pmbootstrap
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: pmbootstrap surum kontrolu
        run: pmbootstrap --version

      - name: pmbootstrap init
        run: |
          yes "" | pmbootstrap -y init || true

      - name: Config zorla ayarla (init sonrasi)
        run: |
          pmbootstrap config device samsung-kylepro
          pmbootstrap config ui console
          pmbootstrap config build_default_device_arch True
          pmbootstrap config hostname samsung-kylepro
          pmbootstrap config user user
          pmbootstrap config ssh_keys False
          pmbootstrap config boot_size 256
          pmbootstrap config extra_space 0
          pmbootstrap config locale en_US.UTF-8
          pmbootstrap config jobs 4
          echo "=== Final Config ==="
          echo "Cihaz: $(pmbootstrap config device)"
          echo "UI: $(pmbootstrap config ui)"
          echo "Arch: $(pmbootstrap config build_default_device_arch)"
          cat ~/.config/pmbootstrap.cfg
          echo "===================="

      - name: Cihaz paketlerini derle
        run: |
          pmbootstrap build device-samsung-kylepro --arch=armv7 --force || true
          pmbootstrap build linux-samsung-kylepro --arch=armv7 --force || true

      - name: postmarketOS imajini olustur
        run: |
          yes "${{ env.PMOS_PASSWORD }}" | pmbootstrap install

      - name: Imaj dosyalarini kontrol et
        run: |
          echo "=== Work dizinindeki imajlar ==="
          find ~/pmbootstrap_work -name "*.img" -o -name "*.img.gz" 2>/dev/null | head -20
          echo ""
          echo "=== Mimari kontrolu ==="
          for img in $(find ~/pmbootstrap_work -name "*.img" 2>/dev/null | head -5); do
            echo "$img:"
            file "$img"
          done

      - name: Imaj dosyalarini disa aktar
        run: |
          mkdir -p output
          pmbootstrap export output/
          ls -lah output/
          echo "=== Mimari kontrolu ==="
          for img in output/*.img*; do
            if [ -f "$img" ]; then
              echo "$img:"
              file "$img"
            fi
          done

      - name: Artifact yukle
        uses: actions/upload-artifact@v4
        with:
          name: postmarketos-samsung-kylepro-${{ github.run_number }}
          path: output/
          retention-days: 14

      - name: Derleme ozeti
        if: always()
        run: |
          echo "========================================="
          echo "Cihaz: Samsung Galaxy Trend Plus (kylepro)"
          echo "UI: ${{ env.PMOS_UI }}"
          echo "========================================="
          pmbootstrap config device 2>/dev/null || true
          ls -lah output/ 2>/dev/null || echo "Dosya bulunamadi"
          df -h
