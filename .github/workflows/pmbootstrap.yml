name: Build postmarketOS Image for GT-S7580

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y python3 python3-git openssl git openssh-client

    - name: Clone and Install pmbootstrap from Source
      run: |
        git clone https://gitlab.postmarketos.org/postmarketOS/pmbootstrap.git
        cd pmbootstrap
        sudo ln -s "$(pwd)/pmbootstrap.py" /usr/local/bin/pmbootstrap
        chmod +x pmbootstrap.py

    - name: Pre-clone pmaports Infrastructure
      run: |
        # init komutunun kilitlenmesini engellemek için pmaports'u doğrudan kendimiz çekiyoruz
        mkdir -p /home/runner/.local/var/pmbootstrap/cache_git
        git clone --depth=1 https://gitlab.postmarketos.org/postmarketOS/pmaports.git /home/runner/.local/var/pmbootstrap/cache_git/pmaports

    - name: Clone Custom GT-S7580 (kylepro) Device Tree
      run: |
        # Klasör isimlerini pmbootstrap'in tanıyacağı paket adlarına (ön eksiz) çeviriyoruz
        cd /home/runner/.local/var/pmbootstrap/cache_git/pmaports/device/testing
        git clone https://github.com/themarcominetti/device-samsung-kylepro.git samsung-kylepro
        git clone https://github.com/themarcominetti/linux-samsung-kylepro.git linux-samsung-kylepro

    - name: Setup pmbootstrap Configuration File
      run: |
        mkdir -p ~/.config
        cat <<EOF > ~/.config/pmbootstrap.cfg
        [pmbootstrap]
        version = 3
        work = /home/runner/.local/var/pmbootstrap
        jobs = 4
        ccache_size = 5G
        is_default_channel = False
        mirrors_alpine = http://dl-cdn.alpinelinux.org/alpine/
        auto_init = True

        [providers]

        [config]
        channel = edge
        arch = armv7
        device = samsung-kylepro
        ui = xfce4
        user = pmos
        extra_packages = none
        timezone = GMT
        keymaps = none
        EOF

    - name: Update pmaports Index
      run: |
        # Yeni eklediğimiz cihaz paketlerini pmbootstrap'e indeksletiyoruz
        pmbootstrap update

    - name: Build Flashable Image
      run: |
        pmbootstrap install --no-fprofile
        pmbootstrap export

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: pmOS-GT-S7580
        path: /home/runner/.local/var/pmbootstrap/chroot_native/tmp/postmarketOS-export/*
 
