name: postmarketOS CI - samsung-kylepro (new infra)

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ----------------------------
      # Checkout your repo
      # ----------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # ----------------------------
      # Install system dependencies
      # ----------------------------
      - name: Install dependencies
        run: |
          sudo apt update

          sudo apt install -y \
            git \
            python3 \
            python3-pip \
            python3-setuptools \
            python3-wheel \
            device-tree-compiler \
            cpio \
            curl \
            bzip2 \
            gzip \
            lzop \
            rsync \
            tar \
            wget \
            xz-utils \
            qemu-user-static \
            binfmt-support

          python3 -m pip install --upgrade pip setuptools wheel

      # ----------------------------
      # Install pmbootstrap (NEW OFFICIAL REPO)
      # ----------------------------
      - name: Install pmbootstrap
        run: |
          git clone https://gitlab.postmarketos.org/postmarketOS/pmbootstrap.git
          cd pmbootstrap
          pip3 install --user -e .

          echo "$HOME/.local/bin" >> $GITHUB_PATH

      # ----------------------------
      # Clone pmaports (official)
      # ----------------------------
      - name: Clone pmaports
        run: |
          git clone https://gitlab.postmarketos.org/postmarketOS/pmaports.git

      # ----------------------------
      # Version sanity check (prevents repo mismatch errors)
      # ----------------------------
      - name: Check versions
        run: |
          pmbootstrap --version
          cd pmaports && git log -1 --oneline

      # ----------------------------
      # Initialize pmbootstrap
      # ----------------------------
      - name: Init pmbootstrap
        run: |
          pmbootstrap --details-to-stdout \
            -p pmaports \
            init --non-interactive \
            --device samsung-kylepro \
            --channel edge

      # ----------------------------
      # Build kernel package
      # ----------------------------
      - name: Build kernel
        run: |
          pmbootstrap -p pmaports build linux-samsung-kylepro

      # ----------------------------
      # Upload artifacts
      # ----------------------------
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kylepro-build
          path: /home/runner/.local/var/pmbootstrap/packages/ 
