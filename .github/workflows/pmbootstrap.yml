name: Build postmarketOS Image

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y python3 python3-git openssl git openssh-client

    - name: Clone and Install pmbootstrap from Source
      run: |
        git clone https://gitlab.com/postmarketOS/pmbootstrap.git
        cd pmbootstrap
        sudo ln -s "$(pwd)/pmbootstrap.py" /usr/local/bin/pmbootstrap
        chmod +x pmbootstrap.py

    - name: Setup pmbootstrap Configuration
      run: |
        mkdir -p ~/.config
        pmbootstrap init --as-configured --path=/tmp/pmbootstrap-work --arch=armv7 --device=samsung-j4plus --channel=edge --ui=xfce4

    - name: Zap and Pull pmaports
      run: |
        pmbootstrap update

    - name: Build Flashable Image
      run: |
        pmbootstrap install --no-fprofile
        pmbootstrap export

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: pmOS-samsung-j4plus
        path: /tmp/pmbootstrap-work/chroot_native/tmp/postmarketOS-export/*
