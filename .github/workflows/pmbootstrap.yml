name: postmarketOS CI - samsung-kylepro

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ----------------------------
      # Checkout repo
      # ----------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ----------------------------
      # Install dependencies
      # ----------------------------
      - name: Install dependencies
        run: |
          sudo apt update

          sudo apt install -y \
            git \
            python3 \
            python3-pip \
            python3-setuptools \
            python3-wheel \
            device-tree-compiler \
            cpio \
            curl \
            bzip2 \
            gzip \
            lzop \
            rsync \
            tar \
            wget \
            xz-utils \
            qemu-user-static \
            binfmt-support

          python3 -m pip install --upgrade pip setuptools wheel

      # ----------------------------
      # Install pmbootstrap (git, not pip)
      # ----------------------------
      - name: Install pmbootstrap
        run: |
          git clone https://gitlab.postmarketos.org/postmarketOS/pmbootstrap.git
          cd pmbootstrap
          pip3 install --user -e .

          echo "$HOME/.local/bin" >> $GITHUB_PATH

      # ----------------------------
      # Clone pmaports
      # ----------------------------
      - name: Clone pmaports
        run: |
          git clone https://gitlab.postmarketos.org/postmarketOS/pmaports.git

      # ----------------------------
      # Check versions (debug safety)
      # ----------------------------
      - name: Check versions
        run: |
          pmbootstrap --version
          cd pmaports && git log -1 --oneline

      # ----------------------------
      # INIT (CORRECT CLI ORDER + NO INVALID FLAGS)
      # ----------------------------
      - name: Init pmbootstrap
        run: |
          printf "\n\n\n\n\n" | pmbootstrap \
            -w /home/runner/work/pmbootstrap \
            -p /home/runner/work/pmaports \
            init

      # ----------------------------
      # Build kernel
      # ----------------------------
      - name: Build kernel
        run: |
          pmbootstrap -p /home/runner/work/pmaports build linux-samsung-kylepro

      # ----------------------------
      # Upload artifacts
      # ----------------------------
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kylepro-build
          path: /home/runner/.local/var/pmbootstrap/packages/
