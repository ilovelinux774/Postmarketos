# .github/workflows/pmos-build.yml
name: postmarketOS Build - Samsung Galaxy Trend Plus (kylepro)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  PMOS_CHANNEL: edge
  PMOS_UI: console
  PMOS_PASSWORD: "147147"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Disk alanını genişlet
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/hostedtoolcache
          df -h

      - name: pmbootstrap yapılandırma dosyasını oluştur
        run: |
          mkdir -p ~/.config
          mkdir -p ~/pmbootstrap_work

          cat > ~/.config/pmbootstrap.cfg << EOF
          [pmbootstrap]
          build_default_device_arch = True
          boot_size = 256
          channel = ${{ env.PMOS_CHANNEL }}
          device = samsung-kylepro
          extra_space = 0
          hostname = samsung-kylepro
          is_default_channel = False
          jobs = $(nproc)
          locale = en_US.UTF-8
          ssh_keys = False
          ui = ${{ env.PMOS_UI }}
          user = user
          work = /home/runner/pmbootstrap_work
          EOF

          sed -i 's/^          //' ~/.config/pmbootstrap.cfg

      - name: pmbootstrap init
        run: |
          yes "" | pmbootstrap init || true

      - name: Cihaz paketlerini derle
        run: |
          pmbootstrap build device-samsung-kylepro --force || true
          pmbootstrap build linux-samsung-kylepro --force || true

      - name: postmarketOS imajını oluştur
        run: |
          yes "${{ env.PMOS_PASSWORD }}" | pmbootstrap install

      - name: İmaj dosyalarını dışa aktar
        run: |
          mkdir -p output
          pmbootstrap export output/
          ls -lah output/

      - name: Artifact yükle
        uses: actions/upload-artifact@v4
        with:
          name: postmarketos-samsung-kylepro-${{ github.run_number }}
          path: output/
          retention-days: 14

      - name: Derleme özeti
        if: always()
        run: |
          echo "Cihaz: Samsung Galaxy Trend Plus (kylepro)"
          echo "Kanal: ${{ env.PMOS_CHANNEL }}"
          echo "Arayüz: ${{ env.PMOS_UI }}"
          ls -lah output/ 2>/dev/null || echo "Dosya bulunamadı"
          df -h
